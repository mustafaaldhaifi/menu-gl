name: Deploy Code Only (No Vendor)

on:
  push:
    branches:
      - main # أو master حسب اسم فرعك الرئيسي

jobs:
  web-deploy:
    name: 🎉 Fast Code-Only Deploy
    runs-on: ubuntu-latest
    steps:
    - name: 🚚 Get latest code
      uses: actions/checkout@v4

    - name: 📂 Sync Code to Hostinger via FTP
      uses: SamKirkland/FTP-Deploy-Action@v4.3.5
      with:
        server: ${{ secrets.FTP_SERVER }}
        username: ${{ secrets.FTP_USERNAME }}
        password: ${{ secrets.FTP_PASSWORD }}
        port: 21
        server-dir: /public_html/
        # نمنع الأداة تماماً من التعامل مع المجلدات الثقيلة والكاش والملفات الحساسة
        exclude: |
          **/vendor/**
          **/node_modules/**
          **/tests/**
          **/.git*
          **/.git*/**
          .env
          bootstrap/cache/*
          storage/framework/cache/*